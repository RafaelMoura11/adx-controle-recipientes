services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: adx_recipientes_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      CI_ENV: development
      DB_HOST: mysql
      DB_USER: adx
      DB_PASSWORD: adx123
      DB_DATABASE: adx_recipientes
      CI_ENCRYPTION_KEY: adx-desafio-troque-esta-chave-em-producao
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql

  mysql:
    image: mariadb:10.11
    container_name: adx_recipientes_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: adx_recipientes
      MYSQL_USER: adx
      MYSQL_PASSWORD: adx123
    ports:
      - "3306:3306"
    volumes:
      - adx_db_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d

  adminer:
    image: adminer
    container_name: adx_recipientes_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - mysql

volumes:
  adx_db_data:
